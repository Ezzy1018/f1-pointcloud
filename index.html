<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F1 — Point Cloud Garage v2</title>
<style>
  :root{
    --bg:#05070d; --ink:#eaf2ff; --muted:#8a97b0; --line:rgba(255,255,255,.08);
    --accent:#5fd0ff;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:var(--bg); color:var(--ink); overflow:hidden;}
  #scene{position:fixed; inset:0; width:100vw; height:100vh; display:block; touch-action:none;}
  /* vignette + studio glow */
  .vignette{position:fixed; inset:0; pointer-events:none; z-index:2;
    background:
      radial-gradient(120% 90% at 50% 18%, rgba(60,90,140,.10), transparent 55%),
      radial-gradient(120% 120% at 50% 120%, rgba(90,180,255,.10), transparent 55%),
      radial-gradient(100% 100% at 50% 50%, transparent 55%, rgba(0,0,0,.65) 100%);
  }
  .ui{position:fixed; z-index:5;}
  .eyebrow{font-size:10px; letter-spacing:.32em; text-transform:uppercase; color:var(--accent); font-weight:600;}
  .top-right{top:26px; right:28px; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; max-width:60vw;}
  .btn{appearance:none; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--ink);
    font-size:12px; font-weight:550; letter-spacing:.02em; padding:9px 14px; border-radius:999px; cursor:pointer;
    backdrop-filter:blur(8px); transition:.18s ease;}
  .btn:hover{background:rgba(95,208,255,.14); border-color:rgba(95,208,255,.4);}
  .btn[data-on="true"]{background:rgba(95,208,255,.18); border-color:rgba(95,208,255,.55); color:#dff4ff;}
  .bottom-left{bottom:26px; left:28px; font-size:12px; color:var(--muted); line-height:1.7;}
  .bottom-left b{color:var(--ink); font-weight:600;}
  .kbd{display:inline-block; padding:1px 7px; border:1px solid var(--line); border-radius:6px; font-size:11px; color:#c3ceE6; background:rgba(255,255,255,.03);}
  .legend{position:fixed; z-index:5; bottom:26px; right:28px; display:flex; flex-direction:column; gap:5px; align-items:flex-end;}
  .chip{display:flex; align-items:center; gap:8px; font-size:12px; color:#cbd5ea; cursor:pointer;
    padding:5px 10px; border-radius:999px; border:1px solid transparent; transition:.15s;}
  .chip:hover{border-color:var(--line); background:rgba(255,255,255,.03);}
  .chip[data-on="true"]{background:rgba(255,255,255,.06); border-color:var(--line); color:#fff;}
  .dot{width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px currentColor;}
  
  #hud{ position:fixed; top:36px; left:40px; z-index:10; width:270px;
    font-family:"Inter",system-ui,sans-serif; color:#fff; user-select:none; }

  .hud-brand{ display:flex; align-items:baseline; gap:8px; padding-bottom:16px;
    margin-bottom:26px; border-bottom:1px solid rgba(255,255,255,.08); }
  .hud-brand .mark{ font-size:15px; opacity:.7 }
  .hud-brand .wordmark{ font-size:18px; font-weight:600; letter-spacing:.02em }
  .hud-brand .sub{ font-size:11px; color:#7f858e; letter-spacing:.04em; margin-left:auto }

  .eyebrow{ font-size:11px; color:#7f858e; letter-spacing:.14em;
    text-transform:uppercase; margin-bottom:18px; }
  .stat{ margin-bottom:22px }
  .stat-value{ font-size:40px; font-weight:200; line-height:1; letter-spacing:-.01em }
  .stat-value .unit{ font-size:15px; font-weight:400; margin-left:6px; color:#c4c8ce }
  .stat-label{ font-size:10.5px; color:#7f858e; letter-spacing:.12em;
    text-transform:uppercase; margin-top:8px; }
  .stat-row{ display:flex; gap:34px }
  .stat-row .stat-value{ font-size:30px }

  .hud-slider{ margin:26px 0 }
  .hud-slider label{ display:block; font-size:10.5px; color:#7f858e;
    letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px }
  .hud-slider input[type=range]{ -webkit-appearance:none; width:100%; height:1px;
    background:rgba(255,255,255,.18); outline:none }
  .hud-slider input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none;
    width:10px; height:10px; border-radius:50%; background:#fff; cursor:pointer; margin-top:-1px }

  .hud-identity{ display:flex; align-items:center; gap:12px; margin-top:28px;
    padding-top:20px; border-top:1px solid rgba(255,255,255,.08); }
  .hud-identity .marker{ width:16px; height:16px; border-radius:50%;
    border:2px solid #fff; box-shadow:0 0 0 3px rgba(255,255,255,.06); flex:0 0 auto; transition: border-color 0.25s ease; }
  .id-name{ font-size:12px; font-weight:600; letter-spacing:.08em }
  .id-sub{ font-size:10.5px; color:#7f858e; margin-top:3px }
  
  .hoverlabel{position:fixed; z-index:6; pointer-events:none; transform:translate(-50%,-140%);
    background:rgba(10,14,22,.85); border:1px solid var(--line); backdrop-filter:blur(8px);
    padding:7px 11px; border-radius:10px; font-size:12px; opacity:0; transition:opacity .12s; white-space:nowrap;}
  .hoverlabel .n{font-weight:650;} .hoverlabel .s{color:var(--muted); font-size:11px; margin-top:2px;}
  #loader {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #05070d;
    transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s ease;
    gap: 20px;
  }
  #loader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .loader__brand {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.28em;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 5px;
    margin-left: 0.28em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .loader__brand span {
    color: var(--accent);
  }
  .loader__pct {
    font-size: 64px;
    font-weight: 200;
    color: #fff;
    letter-spacing: -0.04em;
    margin-bottom: 5px;
    display: flex;
    align-items: baseline;
    font-variant-numeric: tabular-nums;
  }
  .loader__pct i {
    font-size: 18px;
    font-style: normal;
    color: var(--accent);
    margin-left: 2px;
    font-weight: 500;
  }
  .loader__bar {
    width: 220px;
    height: 2px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 99px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .loader__bar span {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    transition: width 0.15s ease-out;
  }
  .loader__enter {
    appearance: none;
    outline: none;
    border: 1px solid var(--accent);
    background: rgba(95, 208, 255, 0.05);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 999px;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 15px rgba(95, 208, 255, 0.1);
  }
  .loader__enter.show {
    opacity: 1;
    transform: scale(1.0);
    pointer-events: auto;
  }
  .loader__enter:hover {
    background: rgba(95, 208, 255, 0.16);
    box-shadow: 0 0 20px rgba(95, 208, 255, 0.3);
  }
  
  @media (max-width:720px){ 
    .dashboard-panel{width:calc(100% - 56px); max-height:45vh; overflow-y:auto;} 
    .legend{display:none;} 
    .top-right{max-width:70vw;} 
    .bottom-left{display:none;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>

  <div id="hud">
    <header class="hud-brand">
      <span class="mark">◈</span>
      <span class="wordmark">RB20</span>
      <span class="sub">Point Cloud Study</span>
    </header>

    <section class="hud-block">
      <div class="eyebrow" id="hudStatTitle">Big Numbers</div>
      <div class="stat">
        <div class="stat-value" id="ptsValue">1.00<span class="unit">M PTS</span></div>
        <div class="stat-label" id="ptsLabel">Cloud Density</div>
      </div>
      <div class="stat-row">
        <div class="stat">
          <div class="stat-value" id="dragValue">0.82<span class="unit">Cd</span></div>
          <div class="stat-label">Drag Coefficient</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="dfValue">12,450<span class="unit">N</span></div>
          <div class="stat-label" id="dfLabel">Downforce</div>
        </div>
      </div>
    </section>

    <div class="hud-slider">
      <label for="density">Cloud Density</label>
      <input id="density" type="range" min="0" max="100" value="100">
    </div>

    <section class="hud-identity">
      <span class="marker" id="hudColorMarker"></span>
      <div>
        <div class="id-name" id="hudPartName">RED BULL RB20</div>
        <div class="id-sub" id="hudPartSub">2024 Season · Surface-Sampled</div>
      </div>
    </section>
  </div>

  <div class="ui top-right">
    <button class="btn" id="toggleColorBtn" data-on="false">Livery Mode</button>
    <button class="btn" id="rotBtn" data-on="true">Auto-rotate</button>
    <button class="btn" id="explodeBtn">Explode all</button>
    <button class="btn" id="resetBtn">Reset view</button>
  </div>

  <div class="ui bottom-left">
    <span class="kbd">Drag</span> orbit &nbsp; <span class="kbd">Scroll</span> zoom &nbsp; <span class="kbd">Click</span> a part to explode
  </div>

  <div class="legend" id="legend"></div>
  <div class="hoverlabel" id="hover"><div class="n"></div><div class="s"></div></div>

  <div id="loader">
    <div class="loader__brand">F1<span>GARAGE</span></div>
    <div class="loader__pct"><span id="loaderPct">0</span><i>%</i></div>
    <div class="loader__bar"><span id="loaderBar" style="width: 0%"></span></div>
    <button id="enterBtn" class="loader__enter">Enter</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
